<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セトリアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎤 セトリアプリ</h1>

<h2>メンバー</h2>
<input id="memberInput" placeholder="名前">
<button id="addMemberBtn">追加</button>
<ul id="memberList"></ul>

<h2>曲</h2>
<input id="songInput" placeholder="曲名">
<button id="addSongBtn">追加</button>
<ul id="songList"></ul>

<h2>曲ごとのメンバー選択</h2>
<div id="songs"></div>

<button id="generateBtn">セトリ生成</button>

<h2>セトリ</h2>
<div id="setlist"></div>

<script src="script.js"></script>
</body>
</html>
