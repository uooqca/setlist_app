<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セトリ役決め</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🎤 セトリ役決め</h1>

  <!-- メンバー -->
  <h2>メンバー登録</h2>
  <input id="memberInput" placeholder="名前入力">
  <button id="addMemberBtn">追加</button>
  <ul id="memberList"></ul>

  <hr>

  <!-- 曲 -->
  <h2>曲追加</h2>
  <input id="songInput" placeholder="曲名入力">
  <button id="addSongBtn">追加</button>

  <h2>曲のメンバー</h2>
  <div id="songs"></div>

  <hr>

  <h2>結果</h2>
  <pre id="result"></pre>

  <script src="script.js"></script>
</body>
</html>
